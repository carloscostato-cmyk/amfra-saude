{% extends "base.html" %}

{% block title %}Página não encontrada | {{ app_name }}{% endblock %}

{% block content %}
<section class="status-panel">
    <span class="section-kicker">404</span>
    <h1>Conteúdo não encontrado.</h1>
    <p>O endereço solicitado pode ter expirado, sido movido ou exigir um link administrativo válido.</p>
    <a href="{{ url_for('public.index') }}" class="button button--primary">Voltar ao início</a>
</section>
{% endblock %}
