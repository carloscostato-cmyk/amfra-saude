<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMFRA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a365d 0%, #2d3748 50%, #4a5568 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo {
            width: 100px;
            height: auto;
            opacity: 0;
            animation: zoomIn 7s ease-in-out forwards;
        }

        @keyframes zoomIn {
            0% {
                transform: scale(0.1);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (min-width: 768px) {
            .logo {
                width: 800px;
            }
        }

        @media (max-width: 767px) {
            .logo {
                width: 90vw;
                max-width: 500px;
            }
        }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='img/amfra_logo.jpeg') }}" alt="AMFRA" class="logo">

    <script>
        setTimeout(() => {
            window.location.href = '/admin/login';
        }, 7000);
    </script>
</body>
</html>
