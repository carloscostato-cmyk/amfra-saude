<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo do ícone com gradiente -->
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo de fundo -->
  <circle cx="30" cy="30" r="28" fill="url(#brainGradient)" opacity="0.1"/>
  
  <!-- Cérebro estilizado com coração (representando psicologia + empatia) -->
  <g transform="translate(10, 10)">
    <!-- Lado esquerdo do cérebro -->
    <path d="M 15 10 Q 8 10 8 17 Q 8 24 12 28 Q 15 31 18 28 Q 20 26 20 23" 
          stroke="url(#brainGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Lado direito do cérebro -->
    <path d="M 25 10 Q 32 10 32 17 Q 32 24 28 28 Q 25 31 22 28 Q 20 26 20 23" 
          stroke="url(#brainGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Conexões neurais (linhas internas) -->
    <path d="M 12 15 Q 15 18 18 15" stroke="url(#brainGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 22 15 Q 25 18 28 15" stroke="url(#brainGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 15 22 Q 20 20 25 22" stroke="url(#brainGradient)" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Coração no centro (empatia/cuidado) -->
    <path d="M 20 18 L 17 21 Q 16 22 16 23 Q 16 25 18 26 L 20 28 L 22 26 Q 24 25 24 23 Q 24 22 23 21 Z" 
          fill="url(#heartGradient)" opacity="0.9"/>
  </g>
  
  <!-- Texto "DeiaPsic" -->
  <text x="65" y="38" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="700" fill="#2c3e50">
    DeiaPsic
  </text>
  
  <!-- Linha decorativa -->
  <line x1="65" y1="45" x2="180" y2="45" stroke="#667eea" stroke-width="2" opacity="0.3"/>
  
  <!-- Subtítulo -->
  <text x="65" y="54" font-family="'Inter', sans-serif" font-size="9" font-weight="500" fill="#7f8c8d" letter-spacing="1">
    PSICOLOGIA CLÍNICA
  </text>
</svg>