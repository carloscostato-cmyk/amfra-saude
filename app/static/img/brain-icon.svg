<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#brainGradient)"/>
  
  <!-- Brain icon -->
  <g transform="translate(256, 256)">
    <!-- Left hemisphere -->
    <path d="M-80,-100 Q-120,-80 -120,-40 Q-120,0 -100,40 Q-80,80 -40,100 L-40,60 Q-60,40 -60,0 Q-60,-40 -40,-60 L-40,-100 Z" 
          fill="#ffffff" opacity="0.95"/>
    
    <!-- Right hemisphere -->
    <path d="M80,-100 Q120,-80 120,-40 Q120,0 100,40 Q80,80 40,100 L40,60 Q60,40 60,0 Q60,-40 40,-60 L40,-100 Z" 
          fill="#ffffff" opacity="0.95"/>
    
    <!-- Center connection -->
    <rect x="-5" y="-100" width="10" height="200" fill="#ffffff" opacity="0.95"/>
    
    <!-- Brain folds/details - left -->
    <path d="M-70,-80 Q-90,-60 -90,-30" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M-70,-40 Q-85,-20 -85,10" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M-70,0 Q-80,20 -80,50" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6"/>
    
    <!-- Brain folds/details - right -->
    <path d="M70,-80 Q90,-60 90,-30" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M70,-40 Q85,-20 85,10" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M70,0 Q80,20 80,50" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6"/>
    
    <!-- Additional details -->
    <circle cx="-60" cy="-50" r="8" fill="#667eea" opacity="0.4"/>
    <circle cx="-60" cy="0" r="8" fill="#667eea" opacity="0.4"/>
    <circle cx="-60" cy="50" r="8" fill="#667eea" opacity="0.4"/>
    <circle cx="60" cy="-50" r="8" fill="#667eea" opacity="0.4"/>
    <circle cx="60" cy="0" r="8" fill="#667eea" opacity="0.4"/>
    <circle cx="60" cy="50" r="8" fill="#667eea" opacity="0.4"/>
  </g>
</svg>
